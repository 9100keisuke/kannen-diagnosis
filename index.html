<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>観念診断 — あなたの心のクセを見つける</title>
<meta name="description" content="15の日常場面に答えるだけ。あなたが無意識に持っている「観念」のパターンを診断します。">
<meta property="og:title" content="観念診断 — あなたの心のクセを見つける">
<meta property="og:description" content="15の日常場面に答えるだけ。あなたが無意識に持っている「観念」を診断します。">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#5B4FBE;--primary-light:#8B7BD4;--primary-dark:#3D2F8C;
  --bg:#F8F7FF;--card:#fff;--text:#2C2C3E;--text-light:#6B6B80;
  --A:#E74C3C;--B:#3498DB;--C:#F39C12;--D:#9B59B6;--E:#1ABC9C;
  --shadow:0 4px 24px rgba(91,79,190,.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100dvh;overflow-x:hidden}
.screen{display:none;min-height:100dvh;animation:fadeIn .5s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

#landing{justify-content:center;align-items:center;text-align:center;padding:2rem;background:linear-gradient(135deg,#5B4FBE 0%,#8B7BD4 50%,#A78BFA 100%);color:#fff}
#landing h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;margin-bottom:.5rem;letter-spacing:-.02em}
#landing .subtitle{font-size:clamp(.95rem,2.5vw,1.15rem);opacity:.9;margin-bottom:2.5rem;line-height:1.8}
#landing .lead{font-size:.9rem;opacity:.75;max-width:360px;margin:0 auto 2rem}
.btn-start{background:#fff;color:var(--primary);border:none;padding:1rem 3rem;border-radius:60px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.2)}
.q-count{display:inline-block;background:rgba(255,255,255,.2);padding:.4rem 1rem;border-radius:20px;font-size:.85rem;margin-bottom:1.5rem}

#name-input{justify-content:center;align-items:center;padding:2rem;background:var(--bg)}
.name-wrap{background:var(--card);border-radius:24px;padding:2.5rem 2rem;box-shadow:var(--shadow);max-width:420px;width:100%;text-align:center}
.name-title{font-size:1.25rem;font-weight:700;margin-bottom:.5rem;line-height:1.6;color:var(--text)}
.name-desc{font-size:.85rem;color:var(--text-light);margin-bottom:1.8rem}
.input-group{text-align:left;margin-bottom:1.2rem}
.input-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:.4rem}
.input-group input{width:100%;padding:.85rem 1rem;border:2px solid #E8E6F0;border-radius:12px;font-size:1rem;transition:border-color .2s;outline:none;background:var(--bg)}
.input-group input:focus{border-color:var(--primary)}
.name-error{color:#E74C3C;font-size:.82rem;min-height:1.2em;margin:.3rem 0}
.btn-next{width:100%;background:var(--primary);color:#fff;border:none;padding:1rem;border-radius:14px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .3s;margin-top:.5rem}
.btn-next:hover{background:var(--primary-dark)}

#quiz{padding:0;background:var(--bg)}
.progress-wrap{position:sticky;top:0;z-index:10;background:var(--card);padding:1rem 1.5rem .8rem;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.progress-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-light);margin-bottom:.5rem}
.progress-bar{height:6px;background:#E8E6F0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .4s ease}
.question-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;max-width:640px;margin:0 auto;width:100%}
.scene-label{font-size:.8rem;color:var(--primary);font-weight:600;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.scene-text{font-size:clamp(1rem,3vw,1.15rem);font-weight:600;margin-bottom:1.5rem;line-height:1.8}
.choices{display:flex;flex-direction:column;gap:.7rem}
.choice{background:var(--card);border:2px solid #E8E6F0;border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .25s;font-size:.95rem;line-height:1.6;text-align:left;-webkit-tap-highlight-color:transparent}
.choice:hover{border-color:var(--primary-light);background:#F3F1FF}
.choice.selected{border-color:var(--primary);background:#EDE9FF;transform:scale(.98)}
.choice-label{display:inline-block;width:1.5rem;height:1.5rem;line-height:1.5rem;text-align:center;border-radius:50%;background:var(--primary);color:#fff;font-size:.75rem;font-weight:700;margin-right:.6rem;flex-shrink:0;vertical-align:middle}
.btn-skip{display:block;margin:1.2rem auto 0;background:none;border:1px solid #D0CDE0;color:var(--text-light);padding:.5rem 1.5rem;border-radius:30px;font-size:.82rem;cursor:pointer;transition:all .2s}
.btn-skip:hover{border-color:var(--primary-light);color:var(--primary)}
.btn-skip:disabled{opacity:.3;cursor:default}

#analyzing{justify-content:center;align-items:center;text-align:center;padding:2rem;background:linear-gradient(135deg,#5B4FBE,#8B7BD4)}
.analyzing-spinner{width:64px;height:64px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
#analyzing p{color:#fff;font-size:1rem;opacity:.9;transition:opacity .3s}

#results{padding:0;background:var(--bg)}
.result-hero{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:2.5rem 1.5rem 3rem;text-align:center}
.result-hero .tag{display:inline-block;background:rgba(255,255,255,.2);padding:.3rem 1rem;border-radius:20px;font-size:.8rem;margin-bottom:1rem}
.result-hero h2{font-size:clamp(1.4rem,4.5vw,2rem);font-weight:800;margin-bottom:.3rem}
.result-hero .type-name{font-size:clamp(1.1rem,3.5vw,1.5rem);opacity:.9;font-weight:500}
.result-body{padding:1.5rem;max-width:640px;margin:0 auto}
.section-title{font-size:1.05rem;font-weight:700;margin:1.5rem 0 .8rem;color:var(--text)}
.chart-wrap{background:var(--card);border-radius:20px;padding:1.5rem 1rem;box-shadow:var(--shadow);margin-bottom:1.5rem}
.chart-wrap canvas{max-height:300px}
.cat-card{background:var(--card);border-radius:16px;padding:1.2rem 1.3rem;box-shadow:var(--shadow);margin-bottom:1rem;border-left:4px solid var(--primary)}
.cat-card.main{border-left-width:5px}
.cat-card h3{font-size:1rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.cat-card .score-badge{font-size:.75rem;background:#EDE9FF;color:var(--primary);padding:.15rem .6rem;border-radius:10px;font-weight:600}
.cat-card p{font-size:.9rem;color:var(--text-light);line-height:1.7;margin-bottom:.6rem}
.cat-card .kannen-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.cat-card .kannen-tag{font-size:.78rem;background:#F3F1FF;color:var(--primary-dark);padding:.25rem .7rem;border-radius:8px}
.cat-A{border-left-color:var(--A)} .cat-A h3{color:var(--A)} .cat-A .score-badge{background:#FDEDEC;color:var(--A)}
.cat-B{border-left-color:var(--B)} .cat-B h3{color:var(--B)} .cat-B .score-badge{background:#EBF5FB;color:var(--B)}
.cat-C{border-left-color:var(--C)} .cat-C h3{color:var(--C)} .cat-C .score-badge{background:#FEF9E7;color:var(--C)}
.cat-D{border-left-color:var(--D)} .cat-D h3{color:var(--D)} .cat-D .score-badge{background:#F4ECF7;color:var(--D)}
.cat-E{border-left-color:var(--E)} .cat-E h3{color:var(--E)} .cat-E .score-badge{background:#E8F8F5;color:var(--E)}

.depth-card{background:var(--card);border-radius:16px;padding:1.3rem;box-shadow:var(--shadow);margin-bottom:1rem}
.depth-card .depth-label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.depth-card .depth-scene{font-size:.92rem;font-weight:600;margin-bottom:.2rem}
.depth-card .depth-cat{font-size:.85rem;color:var(--text-light)}
.depth-card .depth-time{font-size:1.8rem;font-weight:800;margin-top:.3rem}
.depth-fastest .depth-label{color:var(--A)}
.depth-slowest .depth-label{color:var(--B)}
.depth-fastest{border-left:4px solid var(--A)}
.depth-slowest{border-left:4px solid var(--B)}
.depth-hint{font-size:.8rem;color:var(--text-light);margin-top:.4rem;font-style:italic}

.rt-bar-wrap{margin-bottom:.6rem}
.rt-bar-label{font-size:.78rem;color:var(--text-light);margin-bottom:.2rem;display:flex;justify-content:space-between}
.rt-bar-outer{height:8px;background:#E8E6F0;border-radius:4px;overflow:hidden}
.rt-bar-inner{height:100%;border-radius:4px;transition:width .6s ease}

.doc-section{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;padding:2rem 1.5rem;text-align:center;margin:1.5rem 0 2rem;color:#fff}
.doc-text{font-size:1rem;font-weight:600;margin-bottom:1rem;opacity:.95}
.btn-doc{display:inline-block;background:#fff;color:var(--primary);padding:.85rem 2rem;border-radius:60px;font-size:1rem;font-weight:700;text-decoration:none;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.btn-doc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.doc-hint{font-size:.78rem;opacity:.7;margin-top:.8rem}

.result-footer{text-align:center;padding:1.5rem 1rem 3rem;font-size:.78rem;color:var(--text-light)}
</style>
</head>
<body>

<section id="landing" class="screen active">
  <div>
    <div class="q-count">全15問 / 約3分</div>
    <h1>あなたの「隠れた観念」診断</h1>
    <p class="subtitle">日常の場面で、あなたの心が<br>無意識に選んでいるパターンを見つけます</p>
    <p class="lead">「~しなきゃ」「~してはいけない」<br>その思い込みの正体を、15の質問で明らかにします</p>
    <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
  </div>
</section>

<section id="name-input" class="screen">
  <div class="name-wrap">
    <h2 class="name-title">まず、あなたの情報を<br>教えてください</h2>
    <p class="name-desc">診断結果のレポート作成に使用します</p>
    <div class="input-group">
      <label for="inp-line-name">LINE名</label>
      <input type="text" id="inp-line-name" placeholder="LINEの表示名を入力">
    </div>
    <div class="input-group">
      <label for="inp-full-name">お名前（フルネーム）</label>
      <input type="text" id="inp-full-name" placeholder="山田太郎">
    </div>
    <p class="name-error" id="name-error"></p>
    <button class="btn-next" onclick="submitName()">診断を開始する</button>
  </div>
</section>

<section id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="q-num">Q1 / 15</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="question-area" id="question-area"></div>
</section>

<section id="analyzing" class="screen">
  <div>
    <div class="analyzing-spinner"></div>
    <p id="analyze-msg">あなたの回答を分析しています...</p>
  </div>
</section>

<section id="results" class="screen">
  <div class="result-hero">
    <div class="tag">診断結果</div>
    <h2 id="result-title"></h2>
    <p class="type-name" id="result-subtitle"></p>
  </div>
  <div class="result-body">
    <div class="chart-wrap"><canvas id="radar-chart"></canvas></div>
    <div id="cat-cards"></div>
    <h3 class="section-title">深層マップ — 無意識の反応速度</h3>
    <div id="depth-cards"></div>
    <div class="chart-wrap" id="rt-chart-wrap">
      <div id="rt-bars"></div>
    </div>
    <div class="doc-section" id="doc-section" style="display:none">
      <p class="doc-text">あなた専用の診断レポートが作成されました</p>
      <a href="#" id="doc-link" class="btn-doc" target="_blank">レポートを開く</a>
      <p class="doc-hint">このリンクを保存しておくと、いつでも結果を確認できます</p>
    </div>
  </div>
  <div class="result-footer">観念診断 by Keisuke</div>
</section>

<script>
const QUESTIONS = [
  { scene:"友人数人との食事会。会話が盛り上がっている中、ふと頭をよぎるのは？", choices:[
    {text:"自分も何か面白い話をしないとな",cat:"A"},
    {text:"みんなが楽しそうでよかった。自分の話は別にいいかな",cat:"B"},
    {text:"楽しいけど、明日の準備もあるし時間が気になる",cat:"C"},
    {text:"ちょっと疲れてるけど、テンション合わせておこう",cat:"D"},
    {text:"みんないろんなことやってるんだな…",cat:"E"}]},
  { scene:"仕事でミスをして、上司に指摘された。帰り道に頭に浮かぶのは？", choices:[
    {text:"次はちゃんと結果で返さないと",cat:"A"},
    {text:"周りの人はどう見てたかな",cat:"B"},
    {text:"チェックリストを作り直そう。同じミスは絶対しない",cat:"C"},
    {text:"悔しいけど、明日は何事もなかった顔で出社しよう",cat:"D"},
    {text:"やっぱりこの仕事、自分のタイプじゃないのかも",cat:"E"}]},
  { scene:"日曜日、何もせずに一日が終わった。夜、布団の中で思うことは？", choices:[
    {text:"明日からまた頑張れば取り返せるかな",cat:"A"},
    {text:"誰かと予定を入れればよかったかも",cat:"B"},
    {text:"こういう日を作るのがもったいなく感じる",cat:"C"},
    {text:"のんびりしたかったはずなのに、なんかモヤモヤする",cat:"D"},
    {text:"まあ、いつもこんな感じの休日だな",cat:"E"}]},
  { scene:"仕事で成果を出して、同僚から「すごいね」と褒められた。心の中で思うのは？", choices:[
    {text:"たまたまうまくいっただけなんだけどな",cat:"A"},
    {text:"あんまり目立つと変に思われないかな",cat:"B"},
    {text:"これくらいで満足してたら止まっちゃうな",cat:"C"},
    {text:"ありがとう、って素直に返すのが意外と難しい",cat:"D"},
    {text:"自分でもできることあるんだな（ちょっと意外）",cat:"E"}]},
  { scene:"上司から新しいプロジェクトのリーダーを打診された。最初に頭をよぎるのは？", choices:[
    {text:"期待に見合う成果を出さないと",cat:"A"},
    {text:"チームのみんなとうまくやっていけるかな",cat:"B"},
    {text:"まずは情報を集めて、計画をしっかり立てないと",cat:"C"},
    {text:"プレッシャーだけど、頼られてるうちは引き受けないとな",cat:"D"},
    {text:"自分がリーダーって、ちょっとイメージ湧かないな",cat:"E"}]},
  { scene:"SNSで、同年代の知人が起業して成功している投稿を見た。感じるのは？", choices:[
    {text:"自分も何か形にしないとな",cat:"A"},
    {text:"あの人と比べられたら困るな",cat:"B"},
    {text:"行動量が違うんだろうな。自分ももっとやらないと",cat:"C"},
    {text:"すごいとは思うけど、素直に「おめでとう」を送るか迷う",cat:"D"},
    {text:"あの人とは元々の環境が違うしな",cat:"E"}]},
  { scene:"パートナーや親しい人と意見が食い違った。あなたの自然な反応は？", choices:[
    {text:"自分が折れたほうが早いし、波風立てないでおこう",cat:"A"},
    {text:"相手の気持ちを先に聞いてからにしよう",cat:"B"},
    {text:"ちゃんと論点を整理して、冷静に話し合いたい",cat:"C"},
    {text:"言いたいことはあるけど、タイミングを見てからにしよう",cat:"D"},
    {text:"言ったところで、伝わるかわからないしな",cat:"E"}]},
  { scene:"体調が悪くて、会社を休もうか迷っている朝。頭の中を占めているのは？", choices:[
    {text:"休むとその分、来週に負担がくるんだよな",cat:"A"},
    {text:"自分が休んだらチームに申し訳ないな",cat:"B"},
    {text:"午前だけでも行けば、最低限は片付くかな",cat:"C"},
    {text:"声がちょっとおかしいだけだし、行けなくもないか",cat:"D"},
    {text:"休んだところで、すぐ治るわけでもないしな",cat:"E"}]},
  { scene:"会議で「何かアイデアはありますか？」と振られた。思わず感じるのは？", choices:[
    {text:"ちゃんとした意見を言わないと",cat:"A"},
    {text:"みんなの方向性に合った発言にしよう",cat:"B"},
    {text:"もっと事前に考えをまとめておけばよかった",cat:"C"},
    {text:"思いついたことはあるけど、もうちょっと温めてからにしよう",cat:"D"},
    {text:"パッとアイデアが出る人ってすごいな",cat:"E"}]},
  { scene:"引っ越しの荷造りで人手が足りない。友人に手伝いを頼もうか迷っている。", choices:[
    {text:"何かお返ししないと悪いよな",cat:"A"},
    {text:"休みの日に巻き込むのは気が引けるな",cat:"B"},
    {text:"自分で計画を立てれば一人でもなんとかなるか",cat:"C"},
    {text:"「手伝って」って言うの、意外とハードル高いんだよな",cat:"D"},
    {text:"そこまでの関係の友達いたかな…",cat:"E"}]},
  { scene:"年末、一年を振り返っている。ふと湧き上がる感情は？", choices:[
    {text:"来年はもっと目に見える成果を出したい",cat:"A"},
    {text:"あの人にもっと連絡すればよかったかも",cat:"B"},
    {text:"やりたかったことの半分もできてないな",cat:"C"},
    {text:"本当はけっこう大変な一年だったけど、まあなんとかなったかな",cat:"D"},
    {text:"去年と比べて、何か変わったかと言われると微妙だな",cat:"E"}]},
  { scene:"ずっと興味があった習い事の体験教室を見つけた。申し込みボタンの前で考えるのは？", choices:[
    {text:"趣味にお金と時間を使うなら、もっと実用的なことに投資したほうがいいかも",cat:"A"},
    {text:"一人で行って、浮かないかな",cat:"B"},
    {text:"今のスケジュールに入れられるか、まず確認しないと",cat:"C"},
    {text:"やってみたい気持ちはあるけど、周りに言うのはちょっと恥ずかしいかも",cat:"D"},
    {text:"今さら始めても、上手くなるまでに時間かかるしな",cat:"E"}]},
  { scene:"職場でみんなが残業している中、自分だけ定時で帰れる状況。どう感じる？", choices:[
    {text:"自分の仕事が軽いだけなんじゃないかな",cat:"A"},
    {text:"先に帰ると空気的にどうかな",cat:"B"},
    {text:"何か手伝えることがないか、一応聞いてみるか",cat:"C"},
    {text:"帰りたいけど、「お先に」ってなんか言いづらい",cat:"D"},
    {text:"効率よく終わらせたけど、特に褒められるわけでもないしな",cat:"E"}]},
  { scene:"久しぶりの休みに、好きな映画を一人で観に行こうとしている。ふと頭をよぎるのは？", choices:[
    {text:"もっと自分のためになることに時間を使ったほうがいいかな",cat:"A"},
    {text:"一人の休日の過ごし方、聞かれたらなんて言おう",cat:"B"},
    {text:"観終わったら、溜まってるタスクに手をつけよう",cat:"C"},
    {text:"好きなジャンルって人に聞かれると、ちょっと答えにくいんだよな",cat:"D"},
    {text:"映画くらいじゃ、リフレッシュにならない気もするけど",cat:"E"}]},
  { scene:"大切なプレゼンの本番で頭が真っ白になってしまった。終わった後に感じるのは？", choices:[
    {text:"せっかくのチャンスを活かせなかった",cat:"A"},
    {text:"聞いてた人たちに申し訳なかったな",cat:"B"},
    {text:"次は絶対にこうならないように準備量を倍にしよう",cat:"C"},
    {text:"動揺してたけど、なんとか最後まで通せたのはよかったかな",cat:"D"},
    {text:"やっぱり人前で話すのは向いてないんだろうな",cat:"E"}]}
];

const RESERVE = [
  { scene:"友人の結婚式でスピーチを頼まれた。最初に感じるのは？", choices:[
    {text:"ちゃんと心に残るスピーチにしないとな",cat:"A"},
    {text:"他のスピーチと比べられるのが気になる",cat:"B"},
    {text:"台本を何回も練り直して、完成度を上げなきゃ",cat:"C"},
    {text:"緊張してるけど、堂々とやってるように見せたい",cat:"D"},
    {text:"自分のスピーチで空気が変わっちゃったらどうしよう",cat:"E"}]},
  { scene:"後輩から「相談したいことがある」と言われた。思うことは？", choices:[
    {text:"いいアドバイスができるように、ちゃんと準備しておこう",cat:"A"},
    {text:"期待に応えられなかったら気まずいな",cat:"B"},
    {text:"真剣に向き合ってあげないと失礼だよな",cat:"C"},
    {text:"実は自分も余裕ないけど、それは言えないな",cat:"D"},
    {text:"自分にアドバイスする力があるかは正直わからない",cat:"E"}]},
  { scene:"チームで自分だけ違う意見を持っている会議。あなたの思考は？", choices:[
    {text:"的外れだったら評価に響くよな",cat:"A"},
    {text:"場の流れを壊してまで言うことじゃないかも",cat:"B"},
    {text:"もう少しデータを集めてから、次の機会に発言しよう",cat:"C"},
    {text:"反対意見を言う自分を想像すると、なんか気が重い",cat:"D"},
    {text:"言ったところで自分の意見は通らないだろうし",cat:"E"}]},
  { scene:"初めての場所で道に迷ってしまった。頭をよぎるのは？", choices:[
    {text:"こんなことで手間取る自分がちょっと情けない",cat:"A"},
    {text:"人に聞くのも迷惑かもしれないし、自力で探すか",cat:"B"},
    {text:"事前にもっとちゃんと調べておくべきだった",cat:"C"},
    {text:"焦ってるけど、焦ってない顔で歩こう",cat:"D"},
    {text:"方向感覚ないのはもう直らないんだろうな",cat:"E"}]},
  { scene:"自分の誕生日が近づいてきた。ふと思うのは？", choices:[
    {text:"この一年、何か胸を張れることあったかな",cat:"A"},
    {text:"お祝いの連絡が来るか来ないかが、ちょっと気になる",cat:"B"},
    {text:"来年の目標をそろそろ決めないとな",cat:"C"},
    {text:"嬉しいはずなのに、変にテンション上がらない自分がいる",cat:"D"},
    {text:"歳取ったな、くらいの感想しかない",cat:"E"}]}
];

const CATEGORIES = {
  A:{id:"A",name:"存在価値系",typeName:"「条件付きの自分」",color:"#E74C3C",
    desc:"あなたは「何かができる自分」「何かを持っている自分」でないと価値がない、と無意識に信じている傾向があります。ありのままの自分に存在価値を感じにくく、常に「自分は足りているか？」という問いが心の中で回っています。",
    kannen:["人に役に立たないといけない","価値を生み出さないといけない","そのままではいけない","特別な能力やスキルがないといけない","成果を出さないと認めてもらえない","何かを持っていないと愛されない","自分には価値がない"]},
  B:{id:"B",name:"対人関係系",typeName:"「透明な自分」",color:"#3498DB",
    desc:"あなたは他者との関係の中で、自分を消すことで安全を守ろうとする傾向があります。「嫌われたくない」「迷惑をかけたくない」が行動の基準になり、自分の意志よりも周囲の空気を優先してしまいます。",
    kannen:["迷惑をかけちゃいけない","人に嫌われてはいけない","空気を読まないといけない","相手の期待に応えないといけない","NOと言ってはいけない","人の気持ちを優先しないといけない","自分の意見を主張してはいけない"]},
  C:{id:"C",name:"努力・行動系",typeName:"「止まれない自分」",color:"#F39C12",
    desc:"あなたは「頑張り続けること」で自分の居場所を確保しようとする傾向があります。休むこと、楽をすること、手を抜くことに強い罪悪感を感じ、常に「もっとやらなきゃ」というエンジンが回り続けています。",
    kannen:["頑張らないといけない","真面目に生きないといけない","完璧にやらないといけない","責任を果たさないといけない","休んではいけない","楽をしてはいけない","途中でやめてはいけない"]},
  D:{id:"D",name:"感情・自己表現系",typeName:"「仮面の自分」",color:"#9B59B6",
    desc:"あなたは本当の感情を表に出すことに強い抵抗を持っています。弱さ、怒り、悲しみ、喜びさえも「見せてはいけないもの」として抑え込み、常に「大丈夫な自分」を演じ続ける傾向があります。",
    kannen:["弱さを見せてはいけない","泣いてはいけない","怒ってはいけない","本音を言ってはいけない","助けを求めてはいけない"]},
  E:{id:"E",name:"可能性・変化系",typeName:"「檻の中の自分」",color:"#1ABC9C",
    desc:"あなたは自分の可能性に天井を設けてしまう傾向があります。「どうせ自分には無理」「変わりたくても変われない」という思い込みが、新しい挑戦や変化へのブレーキになっています。",
    kannen:["自分はできない","自分には才能がない","自信がないといけない","失敗してはいけない","自分が変わるのは難しい","幸せになってはいけない","お金を稼ぐのは悪いことだ"]}
};

let userName = { lineName:'', fullName:'' };
let currentQ = 0;
let totalAnswered = 0;
const answers = [];
const activeQuestions = [...QUESTIONS];
const reservePool = [...RESERVE];
let skipCount = 0;
const MAX_SKIPS = 5;
let qStartTime = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbxsuy7oy4aIkUCUtGYYSBQ6P0CY8MIP86eVKiICLYQPIVIOViU7RFQ-w_hSMfbMlI4/exec";

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  window.scrollTo(0, 0);
}

function startQuiz() {
  showScreen('name-input');
  document.getElementById('inp-line-name').focus();
}

function submitName() {
  const lineName = document.getElementById('inp-line-name').value.trim();
  const fullName = document.getElementById('inp-full-name').value.trim();
  if (!lineName || !fullName) {
    document.getElementById('name-error').textContent = '両方入力してください';
    return;
  }
  userName = { lineName, fullName };
  currentQ = 0;
  totalAnswered = 0;
  answers.length = 0;
  activeQuestions.length = 0;
  activeQuestions.push(...QUESTIONS);
  reservePool.length = 0;
  reservePool.push(...RESERVE);
  skipCount = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = activeQuestions[currentQ];
  const total = activeQuestions.length;
  const pct = Math.round((totalAnswered / total) * 100);
  document.getElementById('q-num').textContent = `Q${totalAnswered + 1} / ${total}`;
  document.getElementById('q-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const labels = ['A','B','C','D','E'];
  const area = document.getElementById('question-area');
  area.style.animation = 'none';
  area.offsetHeight;
  area.style.animation = 'fadeIn .4s ease';

  const canSkip = reservePool.length > 0 && skipCount < MAX_SKIPS;
  area.innerHTML = `
    <div class="scene-label">Scene ${totalAnswered + 1}</div>
    <p class="scene-text">${q.scene}</p>
    <div class="choices">
      ${q.choices.map((c, i) => `
        <div class="choice" onclick="selectChoice(${i})" role="button" tabindex="0">
          <span class="choice-label">${labels[i]}</span>${c.text}
        </div>
      `).join('')}
    </div>
    ${canSkip ? `<button class="btn-skip" onclick="skipQuestion()">ピンとこない（別の場面に変える）</button>` : ''}
  `;
  qStartTime = performance.now();
}

function selectChoice(idx) {
  const elapsed = Math.round(performance.now() - qStartTime) / 1000;
  const choiceEls = document.querySelectorAll('.choice');
  choiceEls.forEach(el => el.style.pointerEvents = 'none');
  const skipBtn = document.querySelector('.btn-skip');
  if (skipBtn) skipBtn.disabled = true;
  choiceEls[idx].classList.add('selected');

  answers.push({
    question: totalAnswered + 1,
    scene: activeQuestions[currentQ].scene,
    choiceIndex: idx,
    category: activeQuestions[currentQ].choices[idx].cat,
    responseTime: elapsed
  });

  setTimeout(() => {
    totalAnswered++;
    currentQ++;
    if (currentQ < activeQuestions.length) {
      renderQuestion();
    } else {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('q-pct').textContent = '100%';
      showAnalyzing();
    }
  }, 500);
}

function skipQuestion() {
  if (reservePool.length === 0 || skipCount >= MAX_SKIPS) return;
  skipCount++;
  const reserve = reservePool.shift();
  activeQuestions.splice(currentQ, 1, reserve);
  renderQuestion();
}

function playAnimation() {
  return new Promise(resolve => {
    const msgs = ["あなたの回答を分析しています...","心の深層パターンを解析中...","あなた専用のレポートを作成中..."];
    let i = 0;
    const msgEl = document.getElementById('analyze-msg');
    const iv = setInterval(() => {
      i++;
      if (i < msgs.length) {
        msgEl.style.opacity = 0;
        setTimeout(() => { msgEl.textContent = msgs[i]; msgEl.style.opacity = 1; }, 300);
      } else { clearInterval(iv); resolve(); }
    }, 1400);
  });
}

function calcScores() {
  const scores = { A:0, B:0, C:0, D:0, E:0 };
  answers.forEach(a => scores[a.category]++);
  return scores;
}

async function submitToGAS(scores, topCat) {
  if (!GAS_URL) return null;
  const payload = {
    timestamp: new Date().toISOString(),
    lineName: userName.lineName,
    fullName: userName.fullName,
    answers: answers.map(a => `Q${a.question}:${a.category}`).join(','),
    scoreA:scores.A, scoreB:scores.B, scoreC:scores.C, scoreD:scores.D, scoreE:scores.E,
    mainPattern: `${topCat.name} ${topCat.typeName}`,
    reactionTimes: answers.map(a => `Q${a.question}:${a.responseTime.toFixed(1)}s`).join(','),
    skips: skipCount,
    answerDetails: JSON.stringify(answers.map(a => ({q:a.question, cat:a.category, time:a.responseTime, scene:a.scene}))),
    ua: navigator.userAgent
  };
  try {
    const res = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(payload), redirect:'follow'});
    const text = await res.text();
    const data = JSON.parse(text);
    return data.docUrl || null;
  } catch(e) {
    try { await fetch(GAS_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(payload)}); } catch(e2){}
    return null;
  }
}

async function showAnalyzing() {
  showScreen('analyzing');
  const scores = calcScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topCat = CATEGORIES[sorted[0][0]];

  const gasPromise = submitToGAS(scores, topCat);
  await playAnimation();

  const msgEl = document.getElementById('analyze-msg');
  msgEl.style.opacity = 0;
  setTimeout(() => {
    if (!document.getElementById('results').classList.contains('active')) {
      msgEl.textContent = 'レポートを仕上げています...';
      msgEl.style.opacity = 1;
    }
  }, 200);

  const docUrl = await Promise.race([
    gasPromise,
    new Promise(r => setTimeout(() => r(null), 25000))
  ]);

  showResults(scores, topCat, docUrl);
}

function showResults(scores, topCat, docUrl) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const total = answers.length;

  document.getElementById('result-title').textContent = 'あなたの主要な観念パターン';
  document.getElementById('result-subtitle').textContent = `${topCat.name} ${topCat.typeName}`;

  showScreen('results');

  const ctx = document.getElementById('radar-chart').getContext('2d');
  if (window._chart) window._chart.destroy();
  window._chart = new Chart(ctx, {
    type:'radar',
    data:{
      labels: Object.values(CATEGORIES).map(c => c.name),
      datasets:[{
        data:['A','B','C','D','E'].map(k => scores[k]),
        backgroundColor:'rgba(91,79,190,.15)',borderColor:'rgba(91,79,190,.7)',borderWidth:2,
        pointBackgroundColor:['A','B','C','D','E'].map(k => CATEGORIES[k].color),pointRadius:5
      }]
    },
    options:{
      responsive:true,
      scales:{r:{beginAtZero:true,max:Math.max(sorted[0][1]+1,6),ticks:{stepSize:1,font:{size:11}},pointLabels:{font:{size:13,weight:'600'}}}},
      plugins:{legend:{display:false}}
    }
  });

  document.getElementById('cat-cards').innerHTML = sorted.map(([catId, score], i) => {
    const c = CATEGORIES[catId];
    return `<div class="cat-card cat-${catId} ${i===0?'main':''}">
      <h3>${i===0?'★ ':''}${c.name} ${c.typeName}<span class="score-badge">${score} / ${total}</span></h3>
      <p>${c.desc}</p>
      <div class="kannen-tags">${c.kannen.map(k=>`<span class="kannen-tag">${k}</span>`).join('')}</div>
    </div>`;
  }).join('');

  const sortedByTime = [...answers].sort((a, b) => a.responseTime - b.responseTime);
  const fastest = sortedByTime[0];
  const slowest = sortedByTime[sortedByTime.length - 1];
  const maxTime = slowest.responseTime;
  const sceneShort = s => s.length > 40 ? s.slice(0, 40) + '...' : s;

  document.getElementById('depth-cards').innerHTML = `
    <div class="depth-card depth-fastest">
      <div class="depth-label">最も速く反応した場面</div>
      <div class="depth-scene">${sceneShort(fastest.scene)}</div>
      <div class="depth-cat">${CATEGORIES[fastest.category].name} ${CATEGORIES[fastest.category].typeName}</div>
      <div class="depth-time" style="color:${CATEGORIES[fastest.category].color}">${fastest.responseTime.toFixed(1)}秒</div>
      <div class="depth-hint">迷いなく選んだ = この観念が最も深く内面化されています</div>
    </div>
    <div class="depth-card depth-slowest">
      <div class="depth-label">最も迷った場面</div>
      <div class="depth-scene">${sceneShort(slowest.scene)}</div>
      <div class="depth-cat">${CATEGORIES[slowest.category].name} ${CATEGORIES[slowest.category].typeName}</div>
      <div class="depth-time" style="color:${CATEGORIES[slowest.category].color}">${slowest.responseTime.toFixed(1)}秒</div>
      <div class="depth-hint">迷い = この観念を意識化し始めている段階かもしれません</div>
    </div>
  `;

  document.getElementById('rt-bars').innerHTML = `<div style="font-size:.85rem;font-weight:600;margin-bottom:.8rem;color:var(--text-light)">全問の反応速度</div>` +
    answers.map(a => {
      const pct = Math.max((a.responseTime / maxTime) * 100, 8);
      const c = CATEGORIES[a.category];
      return `<div class="rt-bar-wrap">
        <div class="rt-bar-label"><span>Q${a.question} ${c.name}</span><span>${a.responseTime.toFixed(1)}秒</span></div>
        <div class="rt-bar-outer"><div class="rt-bar-inner" style="width:${pct}%;background:${c.color}"></div></div>
      </div>`;
    }).join('');

  if (docUrl) {
    document.getElementById('doc-section').style.display = '';
    document.getElementById('doc-link').href = docUrl;
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('quiz').classList.contains('active')) {
    const idx = '12345'.indexOf(e.key);
    if (idx >= 0 && idx < activeQuestions[currentQ].choices.length) selectChoice(idx);
  }
});

document.getElementById('inp-full-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});
</script>
