<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>観念診断 — あなたの眠った強みが目覚めない原因</title>
<meta name="description" content="あなたの眠った強みが目覚めない原因は「観念」にある。15の質問でその正体を明らかにします。">
<meta property="og:title" content="観念診断 — あなたの眠った強みが目覚めない原因">
<meta property="og:description" content="「〜しなきゃ」「〜してはいけない」という無意識の思い込みの正体を、15の質問で明らかにします。">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#7B68EE;--primary-light:#9D8FFF;--primary-dark:#6354D0;
  --bg:#F5F2FF;--card:rgba(255,255,255,.75);--card-hover:rgba(255,255,255,.9);
  --text:#2D2645;--text-light:#6B6090;--text-dim:#9E96B8;
  --A:#E8555A;--B:#4A8FE7;--C:#E8943A;--D:#9B6DD7;--E:#2CB89A;
  --shadow:0 4px 24px rgba(100,80,180,.1);--glass:rgba(255,255,255,.55);--glass-border:rgba(160,140,220,.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100dvh;overflow-x:hidden}
.screen{display:none;min-height:100dvh;animation:fadeIn .5s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

#landing{justify-content:center;align-items:center;text-align:center;padding:2rem;background:linear-gradient(160deg,#EDE7FF 0%,#F5F0FF 30%,#E8F4FD 60%,#F0E8FF 100%);color:var(--text);position:relative;overflow:hidden}
#landing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(123,104,238,.25) 0%,transparent 50%),radial-gradient(ellipse at 80% 85%,rgba(44,184,154,.12) 0%,transparent 45%),radial-gradient(ellipse at 55% 50%,rgba(157,143,255,.1) 0%,transparent 55%);animation:nebula 15s ease-in-out infinite alternate;pointer-events:none}
#landing>div{position:relative;z-index:1}
#landing h1{font-size:clamp(1.4rem,4.5vw,2.1rem);font-weight:800;margin-bottom:.8rem;letter-spacing:-.02em;line-height:1.5;color:#2D2645}
#landing h1 .accent{background:linear-gradient(135deg,#7B68EE,#9D8FFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.15em;filter:drop-shadow(0 0 8px rgba(123,104,238,.3))}
#landing .subtitle{font-size:clamp(.88rem,2.4vw,1.05rem);opacity:.75;margin-bottom:1rem;line-height:1.9}
#landing .lead{font-size:.88rem;opacity:.5;max-width:360px;margin:0 auto 1.8rem}
.btn-start{background:linear-gradient(135deg,#7B68EE,#9D8FFF);color:#fff;border:none;padding:1rem 3rem;border-radius:60px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .4s;box-shadow:0 4px 20px rgba(123,104,238,.35);position:relative}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 8px 35px rgba(123,104,238,.45)}
.btn-start::after{content:'';position:absolute;inset:-2px;border-radius:inherit;background:linear-gradient(135deg,rgba(123,104,238,.4),rgba(44,184,154,.3));z-index:-1;filter:blur(16px);opacity:.5;animation:btnGlow 4s ease-in-out infinite alternate}
.q-count{display:inline-block;background:rgba(123,104,238,.08);padding:.4rem 1rem;border-radius:20px;font-size:.82rem;margin-bottom:1rem;border:1px solid rgba(123,104,238,.15);letter-spacing:.03em;color:var(--primary)}
@keyframes nebula{0%{opacity:.7;transform:scale(1) rotate(0deg)}100%{opacity:1;transform:scale(1.05) rotate(1deg)}}
@keyframes btnGlow{0%{opacity:.3}100%{opacity:.7}}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particles span{position:absolute;border-radius:50%;background:rgba(123,104,238,.35);box-shadow:0 0 8px 3px rgba(123,104,238,.15)}
.particles span:nth-child(1){width:4px;height:4px;left:12%;top:18%;animation:pf 8s ease-in-out infinite}
.particles span:nth-child(2){width:6px;height:6px;left:28%;top:65%;animation:pf 12s ease-in-out 2s infinite}
.particles span:nth-child(3){width:3px;height:3px;left:48%;top:12%;animation:pf 10s ease-in-out 4s infinite}
.particles span:nth-child(4){width:5px;height:5px;left:68%;top:72%;animation:pf 9s ease-in-out 1s infinite}
.particles span:nth-child(5){width:3px;height:3px;left:82%;top:28%;animation:pf 11s ease-in-out 3s infinite}
.particles span:nth-child(6){width:7px;height:7px;left:38%;top:82%;animation:pf 14s ease-in-out 5s infinite;background:rgba(44,184,154,.25);box-shadow:0 0 12px 5px rgba(44,184,154,.1)}
.particles span:nth-child(7){width:3px;height:3px;left:58%;top:42%;animation:pf 7s ease-in-out 2.5s infinite}
.particles span:nth-child(8){width:4px;height:4px;left:92%;top:55%;animation:pf 13s ease-in-out 6s infinite}
.particles span:nth-child(9){width:10px;height:10px;left:5%;top:50%;animation:pf 16s ease-in-out 1.5s infinite;background:rgba(157,143,255,.15);box-shadow:0 0 25px 10px rgba(157,143,255,.08);filter:blur(2px)}
.particles span:nth-child(10){width:12px;height:12px;left:75%;top:15%;animation:pf 18s ease-in-out 4.5s infinite;background:rgba(123,104,238,.1);box-shadow:0 0 30px 12px rgba(123,104,238,.06);filter:blur(3px)}
@keyframes pf{0%,100%{transform:translateY(0) translateX(0);opacity:.1}20%{opacity:.7}50%{transform:translateY(-40px) translateX(15px);opacity:.25}80%{opacity:.6}}

#name-input{justify-content:center;align-items:center;padding:2rem;background:linear-gradient(160deg,#F0EBFF,#F7F4FF,#ECF6FB)}
.name-wrap{background:var(--card);border:1px solid var(--glass-border);border-radius:24px;padding:2.5rem 2rem;box-shadow:var(--shadow);max-width:420px;width:100%;text-align:center;backdrop-filter:blur(20px)}
.name-title{font-size:1.25rem;font-weight:700;margin-bottom:.5rem;line-height:1.6;color:var(--text)}
.name-desc{font-size:.85rem;color:var(--text-light);margin-bottom:1.8rem}
.input-group{text-align:left;margin-bottom:1.2rem}
.input-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text-light);margin-bottom:.4rem}
.input-group input{width:100%;padding:.85rem 1rem;border:1px solid var(--glass-border);border-radius:12px;font-size:1rem;transition:all .2s;outline:none;background:rgba(255,255,255,.7);color:var(--text)}
.input-group input:focus{border-color:var(--primary);box-shadow:0 0 12px rgba(123,104,238,.15)}
.input-group input::placeholder{color:var(--text-dim)}
.name-error{color:var(--A);font-size:.82rem;min-height:1.2em;margin:.3rem 0}
.btn-next{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;padding:1rem;border-radius:14px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .3s;margin-top:.5rem;box-shadow:0 4px 18px rgba(123,104,238,.25)}
.btn-next:hover{box-shadow:0 6px 28px rgba(123,104,238,.35);transform:translateY(-1px)}

#quiz{padding:0;background:linear-gradient(180deg,#F0EBFF 0%,#F7F4FF 50%,#ECF6FB 100%)}
.progress-wrap{position:sticky;top:0;z-index:10;background:rgba(245,242,255,.92);padding:1rem 1.5rem .8rem;box-shadow:0 2px 15px rgba(100,80,180,.08);backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border)}
.progress-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-light);margin-bottom:.5rem}
.progress-bar{height:6px;background:rgba(123,104,238,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .4s ease;box-shadow:0 0 10px rgba(123,104,238,.3)}
.question-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;max-width:640px;margin:0 auto;width:100%}
.scene-label{font-size:.8rem;color:var(--primary);font-weight:600;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.scene-text{font-size:clamp(1rem,3vw,1.15rem);font-weight:600;margin-bottom:1.5rem;line-height:1.8;color:var(--text)}
.choices{display:flex;flex-direction:column;gap:.7rem}
.choice{background:var(--card);border:1px solid var(--glass-border);border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .25s;font-size:.95rem;line-height:1.6;text-align:left;-webkit-tap-highlight-color:transparent;color:var(--text);backdrop-filter:blur(10px)}
.choice:hover{border-color:rgba(123,104,238,.3);background:var(--card-hover);box-shadow:0 2px 12px rgba(123,104,238,.1)}
.choice.selected{border-color:var(--primary);background:rgba(123,104,238,.1);transform:scale(.98);box-shadow:0 2px 18px rgba(123,104,238,.15)}
.choice-label{display:inline-block;width:1.5rem;height:1.5rem;line-height:1.5rem;text-align:center;border-radius:50%;background:var(--primary);color:#fff;font-size:.75rem;font-weight:700;margin-right:.6rem;flex-shrink:0;vertical-align:middle}
.btn-skip{display:block;margin:1.2rem auto 0;background:none;border:1px solid rgba(123,104,238,.15);color:var(--text-light);padding:.5rem 1.5rem;border-radius:30px;font-size:.82rem;cursor:pointer;transition:all .2s}
.btn-skip:hover{border-color:var(--primary);color:var(--primary)}
.btn-skip:disabled{opacity:.3;cursor:default}

#analyzing{justify-content:center;align-items:center;text-align:center;padding:2rem;background:linear-gradient(160deg,#EDE7FF,#F5F0FF,#E8F4FD);position:relative;overflow:hidden}
#analyzing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(123,104,238,.18) 0%,transparent 60%),radial-gradient(ellipse at 30% 80%,rgba(44,184,154,.08) 0%,transparent 40%);animation:nebula 12s ease-in-out infinite alternate;pointer-events:none}
#analyzing>div{position:relative;z-index:1}
.analyzing-spinner{width:64px;height:64px;border:3px solid rgba(123,104,238,.12);border-top-color:var(--primary);border-radius:50%;animation:spin 1.2s linear infinite;margin-bottom:1.5rem;filter:drop-shadow(0 0 8px rgba(123,104,238,.3))}
@keyframes spin{to{transform:rotate(360deg)}}
#analyzing p{color:var(--text);font-size:1rem;opacity:.8;transition:opacity .3s}

#results{padding:0;background:var(--bg)}
.result-hero{background:linear-gradient(180deg,#E8E0FF 0%,#D8D0F5 40%,#C5B8F0 100%);color:var(--text);padding:2.5rem 1.5rem 3rem;text-align:center;position:relative}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(157,143,255,.25) 0%,transparent 60%);pointer-events:none}
.result-hero .tag{display:inline-block;background:rgba(123,104,238,.1);padding:.3rem 1rem;border-radius:20px;font-size:.8rem;margin-bottom:1rem;border:1px solid rgba(123,104,238,.2);position:relative;color:var(--primary)}
.result-hero h2,.result-hero .type-name{position:relative}
.result-hero h2{font-size:clamp(1.4rem,4.5vw,2rem);font-weight:800;margin-bottom:.3rem;color:#2D2645}
.result-hero .type-name{font-size:clamp(1.1rem,3.5vw,1.5rem);opacity:.85;font-weight:500;color:#3D3460}
.result-body{padding:1.5rem;max-width:640px;margin:0 auto}
.section-title{font-size:1.05rem;font-weight:700;margin:1.5rem 0 .8rem;color:var(--text)}
.chart-wrap{background:var(--card);border:1px solid var(--glass-border);border-radius:20px;padding:1.5rem 1rem;box-shadow:var(--shadow);margin-bottom:1.5rem;backdrop-filter:blur(10px)}
.chart-wrap canvas{max-height:300px}
.cat-card{background:var(--card);border:1px solid var(--glass-border);border-radius:16px;padding:1.2rem 1.3rem;box-shadow:var(--shadow);margin-bottom:1rem;border-left:4px solid var(--primary);backdrop-filter:blur(10px)}
.cat-card.main{border-left-width:5px}
.cat-card h3{font-size:1rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.cat-card .score-badge{font-size:.75rem;background:rgba(123,104,238,.1);color:var(--primary);padding:.15rem .6rem;border-radius:10px;font-weight:600}
.cat-card p{font-size:.9rem;color:var(--text-light);line-height:1.7;margin-bottom:.6rem}
.cat-card .kannen-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.cat-card .kannen-tag{font-size:.78rem;background:rgba(123,104,238,.07);color:var(--primary);padding:.25rem .7rem;border-radius:8px;border:1px solid rgba(123,104,238,.12)}
.cat-A{border-left-color:var(--A)} .cat-A h3{color:var(--A)} .cat-A .score-badge{background:rgba(232,85,90,.08);color:var(--A)}
.cat-B{border-left-color:var(--B)} .cat-B h3{color:var(--B)} .cat-B .score-badge{background:rgba(74,143,231,.08);color:var(--B)}
.cat-C{border-left-color:var(--C)} .cat-C h3{color:var(--C)} .cat-C .score-badge{background:rgba(232,148,58,.08);color:var(--C)}
.cat-D{border-left-color:var(--D)} .cat-D h3{color:var(--D)} .cat-D .score-badge{background:rgba(155,109,215,.08);color:var(--D)}
.cat-E{border-left-color:var(--E)} .cat-E h3{color:var(--E)} .cat-E .score-badge{background:rgba(44,184,154,.08);color:var(--E)}

.depth-card{background:var(--card);border:1px solid var(--glass-border);border-radius:16px;padding:1.3rem;box-shadow:var(--shadow);margin-bottom:1rem;backdrop-filter:blur(10px)}
.depth-card .depth-label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.depth-card .depth-scene{font-size:.92rem;font-weight:600;margin-bottom:.2rem;color:var(--text)}
.depth-card .depth-cat{font-size:.85rem;color:var(--text-light)}
.depth-card .depth-time{font-size:1.8rem;font-weight:800;margin-top:.3rem;color:var(--text)}
.depth-fastest .depth-label{color:var(--A)}
.depth-slowest .depth-label{color:var(--B)}
.depth-fastest{border-left:4px solid var(--A)}
.depth-slowest{border-left:4px solid var(--B)}
.depth-hint{font-size:.8rem;color:var(--text-light);margin-top:.4rem;font-style:italic}

.rt-bar-wrap{margin-bottom:.6rem}
.rt-bar-label{font-size:.78rem;color:var(--text-light);margin-bottom:.2rem;display:flex;justify-content:space-between}
.rt-bar-outer{height:8px;background:rgba(123,104,238,.06);border-radius:4px;overflow:hidden}
.rt-bar-inner{height:100%;border-radius:4px;transition:width .6s ease}

.doc-section{background:linear-gradient(135deg,#E8E0FF,#DDD5F8);border:1px solid rgba(123,104,238,.2);border-radius:20px;padding:2rem 1.5rem;text-align:center;margin:1.5rem 0 2rem;color:var(--text);box-shadow:0 4px 30px rgba(123,104,238,.08)}
.doc-text{font-size:1rem;font-weight:600;margin-bottom:1rem;opacity:.85}
.btn-doc{display:inline-block;background:linear-gradient(135deg,#7B68EE,#9D8FFF);color:#fff;border:none;padding:.85rem 2rem;border-radius:60px;font-size:1rem;font-weight:700;text-decoration:none;transition:all .4s;box-shadow:0 4px 20px rgba(123,104,238,.25);cursor:pointer}
.btn-doc:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(123,104,238,.35)}
.doc-hint{font-size:.78rem;color:var(--text-light);opacity:.7;margin-top:.8rem}

.result-footer{text-align:center;padding:1.5rem 1rem 3rem;font-size:.78rem;color:var(--text-dim)}
</style>
</head>
<body>

<section id="landing" class="screen active">
  <div class="particles" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div>
    <div class="q-count">全15問 / 約3分</div>
    <h1>あなたの眠った強みが<br>目覚めない原因である<br><span class="accent">「観念」</span>診断</h1>
    <p class="subtitle">なぜあなたの眠った強みが目覚めないのか。<br>その原因はすべて<br>「〜しなきゃ」「〜してはいけない」という<br>無意識の思い込み（観念）があるからです。</p>
    <p class="lead">その観念の正体を、15の質問で明らかにします。</p>
    <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
  </div>
</section>

<section id="name-input" class="screen">
  <div class="name-wrap">
    <h2 class="name-title">まず、あなたの情報を<br>教えてください</h2>
    <p class="name-desc">診断結果のレポート作成に使用します</p>
    <div class="input-group">
      <label for="inp-line-name">LINE名</label>
      <input type="text" id="inp-line-name" placeholder="LINEの表示名を入力">
    </div>
    <div class="input-group">
      <label for="inp-full-name">お名前（フルネーム）</label>
      <input type="text" id="inp-full-name" placeholder="山田太郎">
    </div>
    <p class="name-error" id="name-error"></p>
    <button class="btn-next" onclick="submitName()">診断を開始する</button>
  </div>
</section>

<section id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="q-num">Q1 / 15</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="question-area" id="question-area"></div>
</section>

<section id="analyzing" class="screen">
  <div>
    <div class="analyzing-spinner"></div>
    <p id="analyze-msg">あなたの回答を分析しています...</p>
  </div>
</section>

<section id="results" class="screen">
  <div class="result-hero">
    <div class="tag">診断結果</div>
    <h2 id="result-title"></h2>
    <p class="type-name" id="result-subtitle"></p>
  </div>
  <div class="result-body">
    <div class="chart-wrap"><canvas id="radar-chart"></canvas></div>
    <div id="cat-cards"></div>
    <h3 class="section-title">深層マップ — 無意識の反応速度</h3>
    <div id="depth-cards"></div>
    <div class="chart-wrap" id="rt-chart-wrap">
      <div id="rt-bars"></div>
    </div>
    <div class="doc-section" id="doc-section" style="display:none">
      <p class="doc-text">あなた専用の診断レポートです</p>
      <button class="btn-doc" id="btn-pdf" onclick="downloadPDF()">診断レポートをダウンロード</button>
      <p class="doc-hint" id="pdf-hint">PDFファイルとして保存できます</p>
    </div>
  </div>
  <div class="result-footer">観念診断 by Keisuke</div>
</section>

<script>
const QUESTIONS = [
  { scene:"友人数人との食事会。会話が盛り上がっている中、ふと頭をよぎるのは？", choices:[
    {text:"自分も何か面白い話をしないとな",cat:"A"},
    {text:"みんなが楽しそうでよかった。自分の話は別にいいかな",cat:"B"},
    {text:"楽しいけど、明日の準備もあるし時間が気になる",cat:"C"},
    {text:"ちょっと疲れてるけど、テンション合わせておこう",cat:"D"},
    {text:"みんないろんなことやってるんだな…",cat:"E"}]},
  { scene:"仕事でミスをして、上司に指摘された。帰り道に頭に浮かぶのは？", choices:[
    {text:"次はちゃんと結果で返さないと",cat:"A"},
    {text:"周りの人はどう見てたかな",cat:"B"},
    {text:"チェックリストを作り直そう。同じミスは絶対しない",cat:"C"},
    {text:"悔しいけど、明日は何事もなかった顔で出社しよう",cat:"D"},
    {text:"やっぱりこの仕事、自分のタイプじゃないのかも",cat:"E"}]},
  { scene:"日曜日、何もせずに一日が終わった。夜、布団の中で思うことは？", choices:[
    {text:"明日からまた頑張れば取り返せるかな",cat:"A"},
    {text:"誰かと予定を入れればよかったかも",cat:"B"},
    {text:"こういう日を作るのがもったいなく感じる",cat:"C"},
    {text:"のんびりしたかったはずなのに、なんかモヤモヤする",cat:"D"},
    {text:"まあ、いつもこんな感じの休日だな",cat:"E"}]},
  { scene:"仕事で成果を出して、同僚から「すごいね」と褒められた。心の中で思うのは？", choices:[
    {text:"たまたまうまくいっただけなんだけどな",cat:"A"},
    {text:"あんまり目立つと変に思われないかな",cat:"B"},
    {text:"これくらいで満足してたら止まっちゃうな",cat:"C"},
    {text:"ありがとう、って素直に返すのが意外と難しい",cat:"D"},
    {text:"自分でもできることあるんだな（ちょっと意外）",cat:"E"}]},

let userName = { lineName:'', fullName:'' };
let currentQ = 0;
let totalAnswered = 0;
const answers = [];
const activeQuestions = [...QUESTIONS];
const reservePool = [...RESERVE];
let skipCount = 0;
const MAX_SKIPS = 5;
let qStartTime = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyLQDTrFKsErA4Z5znf-z3SoD_abTiMO9wJuGtJwwOBb9hM7AU1wSpYEIj_rfdGR8O8/exec";

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  window.scrollTo(0, 0);
}

function startQuiz() {
  showScreen('name-input');
  document.getElementById('inp-line-name').focus();
}

function submitName() {
  const lineName = document.getElementById('inp-line-name').value.trim();
  const fullName = document.getElementById('inp-full-name').value.trim();
  if (!lineName || !fullName) {
    document.getElementById('name-error').textContent = '両方入力してください';
    return;
  }
  userName = { lineName, fullName };
  currentQ = 0;
  totalAnswered = 0;
  answers.length = 0;
  activeQuestions.length = 0;
  activeQuestions.push(...QUESTIONS);
  reservePool.length = 0;
  reservePool.push(...RESERVE);
  skipCount = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = activeQuestions[currentQ];
  const total = activeQuestions.length;
  const pct = Math.round((totalAnswered / total) * 100);
  document.getElementById('q-num').textContent = `Q${totalAnswered + 1} / ${total}`;
  document.getElementById('q-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const labels = ['A','B','C','D','E'];
  const area = document.getElementById('question-area');
  area.style.animation = 'none';
  area.offsetHeight;
  area.style.animation = 'fadeIn .4s ease';

  const canSkip = reservePool.length > 0 && skipCount < MAX_SKIPS;
  area.innerHTML = `
    <div class="scene-label">Scene ${totalAnswered + 1}</div>
    <p class="scene-text">${q.scene}</p>
    <div class="choices">
      ${q.choices.map((c, i) => `
        <div class="choice" onclick="selectChoice(${i})" role="button" tabindex="0">
          <span class="choice-label">${labels[i]}</span>${c.text}
        </div>
      `).join('')}
    </div>
    ${canSkip ? `<button class="btn-skip" onclick="skipQuestion()">ピンとこない（別の場面に変える）</button>` : ''}
  `;
  qStartTime = performance.now();
}

function selectChoice(idx) {
  const elapsed = Math.round(performance.now() - qStartTime) / 1000;
  const choiceEls = document.querySelectorAll('.choice');
  choiceEls.forEach(el => el.style.pointerEvents = 'none');
  const skipBtn = document.querySelector('.btn-skip');
  if (skipBtn) skipBtn.disabled = true;
  choiceEls[idx].classList.add('selected');

  answers.push({
    question: totalAnswered + 1,
    scene: activeQuestions[currentQ].scene,
    choiceIndex: idx,
    category: activeQuestions[currentQ].choices[idx].cat,
    responseTime: elapsed
  });

  setTimeout(() => {
    totalAnswered++;
    currentQ++;
    if (currentQ < activeQuestions.length) {
      renderQuestion();
    } else {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('q-pct').textContent = '100%';
      showAnalyzing();
    }
  }, 500);
}

function skipQuestion() {
  if (reservePool.length === 0 || skipCount >= MAX_SKIPS) return;
  skipCount++;
  const reserve = reservePool.shift();
  activeQuestions.splice(currentQ, 1, reserve);
  renderQuestion();
}

function playAnimation() {
  return new Promise(resolve => {
    const msgs = ["あなたの回答を分析しています...","心の深層パターンを解析中...","あなた専用のレポートを作成中..."];
    let i = 0;
    const msgEl = document.getElementById('analyze-msg');
    const iv = setInterval(() => {
      i++;
      if (i < msgs.length) {
        msgEl.style.opacity = 0;
        setTimeout(() => { msgEl.textContent = msgs[i]; msgEl.style.opacity = 1; }, 300);
      } else { clearInterval(iv); resolve(); }
    }, 1400);
  });
}

function calcScores() {
  const scores = { A:0, B:0, C:0, D:0, E:0 };
  answers.forEach(a => scores[a.category]++);
  return scores;
}

async function submitToGAS(reportUrl) {
  if (!GAS_URL) return;
  const payload = {
    timestamp: new Date().toISOString(),
    lineName: userName.lineName,
    fullName: userName.fullName,
    reportUrl: reportUrl
  };
  try {
    await fetch(GAS_URL, {method:'POST', body:JSON.stringify(payload), redirect:'follow'});
  } catch(e) {
    try { await fetch(GAS_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(payload)}); } catch(e2){}
  }
}

async function showAnalyzing() {
  showScreen('analyzing');
  const scores = calcScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topCat = CATEGORIES[sorted[0][0]];
  const reportUrl = generateShareUrl(scores);

  submitToGAS(reportUrl).catch(() => {});
  await playAnimation();
  showResults(scores, topCat);
}

function showResults(scores, topCat) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const total = answers.length;

  document.getElementById('result-title').textContent = 'あなたの主要な観念パターン';
  document.getElementById('result-subtitle').textContent = `${topCat.name} ${topCat.typeName}`;

  showScreen('results');

  const ctx = document.getElementById('radar-chart').getContext('2d');
  if (window._chart) window._chart.destroy();
  window._chart = new Chart(ctx, {
    type:'radar',
    data:{
      labels: Object.values(CATEGORIES).map(c => c.name),
      datasets:[{
        data:['A','B','C','D','E'].map(k => scores[k]),
        backgroundColor:'rgba(123,104,238,.12)',borderColor:'rgba(123,104,238,.6)',borderWidth:2,
        pointBackgroundColor:['A','B','C','D','E'].map(k => CATEGORIES[k].color),pointRadius:5
      }]
    },
    options:{
      responsive:true,
      scales:{r:{beginAtZero:true,max:Math.max(sorted[0][1]+1,6),ticks:{stepSize:1,font:{size:11},color:'#6B6090',backdropColor:'transparent'},pointLabels:{font:{size:13,weight:'600'},color:'#2D2645'},grid:{color:'rgba(123,104,238,.1)'},angleLines:{color:'rgba(123,104,238,.1)'}}},
      plugins:{legend:{display:false}}
    }
  });

  document.getElementById('cat-cards').innerHTML = sorted.map(([catId, score], i) => {
    const c = CATEGORIES[catId];
    return `<div class="cat-card cat-${catId} ${i===0?'main':''}">
      <h3>${i===0?'★ ':''}${c.name} ${c.typeName}<span class="score-badge">${score} / ${total}</span></h3>
      <p>${c.desc}</p>
      <div class="kannen-tags">${c.kannen.map(k=>`<span class="kannen-tag">${k}</span>`).join('')}</div>
    </div>`;
  }).join('');

  const sortedByTime = [...answers].sort((a, b) => a.responseTime - b.responseTime);
  const fastest = sortedByTime[0];
  const slowest = sortedByTime[sortedByTime.length - 1];
  const maxTime = slowest.responseTime;
  const sceneShort = s => s.length > 40 ? s.slice(0, 40) + '...' : s;

  document.getElementById('depth-cards').innerHTML = `
    <div class="depth-card depth-fastest">
      <div class="depth-label">最も速く反応した場面</div>
      <div class="depth-scene">${sceneShort(fastest.scene)}</div>
      <div class="depth-cat">${CATEGORIES[fastest.category].name} ${CATEGORIES[fastest.category].typeName}</div>
      <div class="depth-time" style="color:${CATEGORIES[fastest.category].color}">${fastest.responseTime.toFixed(1)}秒</div>
      <div class="depth-hint">迷いなく選んだ = この観念が最も深く内面化されています</div>
    </div>
    <div class="depth-card depth-slowest">
      <div class="depth-label">最も迷った場面</div>
      <div class="depth-scene">${sceneShort(slowest.scene)}</div>
      <div class="depth-cat">${CATEGORIES[slowest.category].name} ${CATEGORIES[slowest.category].typeName}</div>
      <div class="depth-time" style="color:${CATEGORIES[slowest.category].color}">${slowest.responseTime.toFixed(1)}秒</div>
      <div class="depth-hint">迷い = この観念を意識化し始めている段階かもしれません</div>
    </div>
  `;

  document.getElementById('rt-bars').innerHTML = `<div style="font-size:.85rem;font-weight:600;margin-bottom:.8rem;color:var(--text-light)">全問の反応速度</div>` +
    answers.map(a => {
      const pct = Math.max((a.responseTime / maxTime) * 100, 8);
      const c = CATEGORIES[a.category];
      return `<div class="rt-bar-wrap">
        <div class="rt-bar-label"><span>Q${a.question} ${c.name}</span><span>${a.responseTime.toFixed(1)}秒</span></div>
        <div class="rt-bar-outer"><div class="rt-bar-inner" style="width:${pct}%;background:${c.color}"></div></div>
      </div>`;
    }).join('');

  window._shareUrl = generateShareUrl(scores);
  window._pdfScores = scores;
  window._pdfTopCat = topCat;
  document.getElementById('doc-section').style.display = '';
}

document.addEventListener('keydown', e => {
  if (document.getElementById('quiz').classList.contains('active')) {
    const idx = '12345'.indexOf(e.key);
    if (idx >= 0 && idx < activeQuestions[currentQ].choices.length) selectChoice(idx);
  }
});

document.getElementById('inp-full-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

function generateShareUrl(scores) {
  const data = {
    n: userName.fullName,
    s: [scores.A, scores.B, scores.C, scores.D, scores.E],
    a: answers.map(a => [a.question, a.category, +(a.responseTime.toFixed(1)), a.scene]),
    sk: skipCount,
    d: new Date().toISOString().split('T')[0]
  };
  return window.location.href.split('#')[0] + '#r=' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

  const wrap = s => `<div ${S}="width:${W}px;${F};background:#fff;color:#2D2645;line-height:1.6;padding:16px 24px">${s}</div>`;
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  const total = Object.values(scores).reduce((s,v) => s+v, 0);
  const name = userName.fullName || '回答者';
  const date = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'});
  const blocks = [];

  blocks.push(wrap(`<div ${S}="text-align:center;padding:10px 0">
    <div ${S}="font-size:11px;color:#7B68EE;font-weight:600;margin-bottom:6px">観念診断レポート</div>
    <div ${S}="font-size:22px;font-weight:800;margin-bottom:4px">${name} さんの診断結果</div>
    <div ${S}="font-size:15px;color:#6B6090">${topCat.name} ${topCat.typeName}</div>
    <div ${S}="font-size:11px;color:#9E96B8;margin-top:6px">${date}</div>
  </div>`));

  sorted.forEach(([k,v], i) => {
    const c = CATEGORIES[k];
    const pct = total > 0 ? Math.max(Math.round(v/total*100), 5) : 5;
    let title = i === 0 ? `<div ${S}="font-size:14px;font-weight:700;margin-bottom:10px">カテゴリ別スコア</div>` : '';
    blocks.push(wrap(`${title}<div ${S}="background:#fff;border:1px solid #e8e4f0;border-radius:12px;padding:14px 16px;border-left:4px solid ${c.color}">
      <div ${S}="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span ${S}="font-weight:700;color:${c.color};font-size:13px">${i===0?'★ ':''}${c.name} ${c.typeName}</span>
        <span ${S}="font-size:11px;background:#f0eef5;padding:2px 8px;border-radius:8px;font-weight:600">${v} / ${total}</span>
      </div>
      <div ${S}="height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:8px">
        <div ${S}="height:100%;width:${pct}%;background:${c.color};border-radius:3px"></div>
      </div>
      <p ${S}="font-size:12px;color:#555;line-height:1.7;margin:0 0 8px">${c.desc}</p>
      <div ${S}="display:flex;flex-wrap:wrap;gap:4px">${c.kannen.map(k => `<span ${S}="font-size:10px;background:#f3f1ff;color:#5b4fbe;padding:2px 8px;border-radius:6px">・${k}</span>`).join('')}</div>
    </div>`));
  });

  if (answers.length > 0) {
    const byTime = [...answers].sort((a,b) => a.responseTime - b.responseTime);
    const fastest = byTime[0], slowest = byTime[byTime.length-1];
    const fC = CATEGORIES[fastest.category], sC = CATEGORIES[slowest.category];
    const maxT = slowest.responseTime;

    blocks.push(wrap(`<div ${S}="font-size:14px;font-weight:700;margin-bottom:10px">深層マップ</div>
      <div ${S}="background:#fff;border:1px solid #e8e4f0;border-radius:12px;padding:12px 14px;border-left:4px solid ${fC.color}">
        <div ${S}="font-size:10px;font-weight:700;color:${fC.color};text-transform:uppercase;margin-bottom:4px">最も速く反応した場面</div>
        <div ${S}="font-size:12px;font-weight:600;line-height:1.5">${fastest.scene||'Q'+fastest.question}</div>
        <div ${S}="font-size:11px;color:#888">${fC.name}</div>
        <div ${S}="font-size:20px;font-weight:800;color:${fC.color};margin-top:2px">${fastest.responseTime.toFixed(1)}秒</div>
      </div>`));

    blocks.push(wrap(`<div ${S}="background:#fff;border:1px solid #e8e4f0;border-radius:12px;padding:12px 14px;border-left:4px solid ${sC.color}">
        <div ${S}="font-size:10px;font-weight:700;color:${sC.color};text-transform:uppercase;margin-bottom:4px">最も迷った場面</div>
        <div ${S}="font-size:12px;font-weight:600;line-height:1.5">${slowest.scene||'Q'+slowest.question}</div>
        <div ${S}="font-size:11px;color:#888">${sC.name}</div>
        <div ${S}="font-size:20px;font-weight:800;color:${sC.color};margin-top:2px">${slowest.responseTime.toFixed(1)}秒</div>
      </div>`));

    blocks.push(wrap(`<div ${S}="background:#fff;border:1px solid #e8e4f0;border-radius:12px;padding:12px 14px">
      <div ${S}="font-size:12px;font-weight:600;color:#6b6b80;margin-bottom:8px">全問の反応速度</div>
      ${answers.map(a => {
        const ac = CATEGORIES[a.category];
        const pct = Math.max((a.responseTime/maxT)*100, 3);
        return `<div ${S}="margin-bottom:5px">
          <div ${S}="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:2px"><span>Q${a.question} ${ac.name}</span><span>${a.responseTime.toFixed(1)}秒</span></div>
          <div ${S}="height:5px;background:#eee;border-radius:3px;overflow:hidden"><div ${S}="height:100%;width:${pct}%;background:${ac.color};border-radius:3px"></div></div>
        </div>`;
      }).join('')}
    </div>`));
  }

  blocks.push(wrap(`<div ${S}="background:#f8f7ff;border-radius:12px;padding:16px;font-size:12px;color:#555;line-height:1.8">
    <p>この診断結果は、あなたの無意識的な思考パターンの傾向を示すものです。</p>
    <p ${S}="margin-top:8px"><strong>観念は変えられます。</strong>まずは「自分がこういうパターンを持っている」と認識すること。それが変化の第一歩です。</p>
  </div>
  <div ${S}="text-align:center;font-size:10px;color:#bbb;margin-top:12px">観念診断 by Keisuke</div>`));

  return blocks;
}

async function downloadPDF() {
  const btn = document.getElementById('btn-pdf');
  const hint = document.getElementById('pdf-hint');
  btn.textContent = 'レポート生成中...';
  btn.disabled = true;

  try {
    const scores = window._pdfScores;
    const topCat = window._pdfTopCat;
    const blocks = buildPdfBlocks(scores, topCat);

    const { jsPDF } = window.jspdf;
    const pdfW = 210, margin = 10, contentW = pdfW - margin*2, pageH = 297 - margin*2;
    const pdf = new jsPDF('p','mm','a4');
    let curY = margin;

    for (let i = 0; i < blocks.length; i++) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1';
      wrap.innerHTML = blocks[i];
      document.body.appendChild(wrap);
      await new Promise(r => setTimeout(r, 50));

      const canvas = await html2canvas(wrap.firstElementChild, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
      document.body.removeChild(wrap);

      const ratio = canvas.height / canvas.width;
      const blockH = contentW * ratio;

      if (curY + blockH > margin + pageH && curY > margin) {
        pdf.addPage();
        curY = margin;
      }

      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', margin, curY, contentW, blockH);
      curY += blockH;
    }

    pdf.save(`観念診断_${userName.fullName || '結果'}.pdf`);
    btn.textContent = 'ダウンロード完了 ✓';
    hint.textContent = 'PDFが保存されました';
    setTimeout(() => { btn.textContent = '診断レポートをダウンロード'; btn.disabled = false; hint.textContent = 'PDFファイルとして保存できます'; }, 3000);
  } catch (e) {
    btn.textContent = '診断レポートをダウンロード'; btn.disabled = false;
    hint.textContent = 'エラーが発生しました。もう一度お試しください';
  }
}

(function() {
  const h = window.location.hash;
  if (!h.startsWith('#r=')) return;
  try {
    const d = JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
    userName = { lineName: '', fullName: d.n };
    answers.length = 0;
    d.a.forEach(a => answers.push({
      question: a[0], category: a[1], responseTime: a[2], scene: a[3] || ('Q' + a[0])
    }));
    skipCount = d.sk || 0;
    const scores = {A:d.s[0], B:d.s[1], C:d.s[2], D:d.s[3], E:d.s[4]};
    const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
    document.title = d.n + ' さんの観念診断結果';
    showResults(scores, CATEGORIES[sorted[0][0]]);
  } catch(e) {}
})();
</script>
